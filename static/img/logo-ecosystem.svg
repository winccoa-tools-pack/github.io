<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="WinCC OA ecosystem icon">
  <!-- Original icon: ecosystem/orbits + connected nodes (no third-party logo assets) -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#134a5e"/>
      <stop offset="1" stop-color="#2387aa"/>
    </linearGradient>
  </defs>

  <rect x="16" y="16" width="224" height="224" rx="52" fill="url(#bg)"/>

  <!-- Orbits -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="128" cy="128" r="66" stroke="#ffffff" stroke-opacity="0.78" stroke-width="10"/>
    <path d="M62 136c18 36 58 62 102 62 23 0 44-7 61-18" stroke="#41aaaa" stroke-opacity="0.92" stroke-width="10"/>
    <path d="M78 86c16-20 40-32 66-32 34 0 64 20 79 50" stroke="#ffffff" stroke-opacity="0.55" stroke-width="8"/>

    <!-- Connections (graph-like) -->
    <path d="M86 162L128 128L170 98" stroke="#ffffff" stroke-opacity="0.75" stroke-width="8"/>
    <path d="M94 104L128 128L180 154" stroke="#41aaaa" stroke-opacity="0.9" stroke-width="8"/>
  </g>

  <!-- Nodes -->
  <g>
    <circle cx="128" cy="128" r="18" fill="#ffffff"/>
    <circle cx="86" cy="162" r="14" fill="#41aaaa"/>
    <circle cx="170" cy="98" r="14" fill="#41aaaa"/>
    <circle cx="94" cy="104" r="10" fill="#ffffff" fill-opacity="0.9"/>
    <circle cx="180" cy="154" r="10" fill="#ffffff" fill-opacity="0.9"/>
  </g>
</svg>
