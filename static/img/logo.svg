<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="OA tools">
	<!-- Original icon: 2-line mark "OA" / "tools" -->
	<rect x="16" y="16" width="224" height="224" rx="52" fill="#2387aa" />

	<!-- 4 small tiles ("extensions" motif) -->
	<g fill="#41aaaa">
		<rect x="182" y="182" width="18" height="18" rx="4" />
		<rect x="204" y="182" width="18" height="18" rx="4" />
		<rect x="182" y="204" width="18" height="18" rx="4" />
		<rect x="204" y="204" width="18" height="18" rx="4" />
	</g>

	<g fill="#ffffff" text-anchor="middle">
		<text
			x="128"
			y="128"
			font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif"
			font-size="86"
			font-weight="800"
			letter-spacing="1">OA</text>
		<text
			x="128"
			y="178"
			font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif"
			font-size="44"
			font-weight="700"
			letter-spacing="0.5">tools</text>
	</g>
</svg>