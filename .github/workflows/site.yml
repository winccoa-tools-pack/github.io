name: Website — Generate Overview & Deploy

on:
  schedule:
    - cron: "5 2 * * *" # daily at 02:05 UTC
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  # GitHub Actions is deprecating Node.js 20 for JavaScript-based actions.
  # Opt into Node.js 24 now to avoid surprise breakages when the default changes.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write # to commit generated pages
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  generate-cookbooks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Generate Cookbooks page from GitHub repositories
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/generate-cookbooks.mjs

      - name: Commit updated Cookbooks page (only if changed)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(docs): update cookbooks page [skip ci]"
          file_pattern: docs/cookbooks/**

  generate-vision:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Generate Vision pages from GitHub issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/generate-vision.mjs

      - name: Commit updated Vision pages (only if changed)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(docs): update vision pages [skip ci]"
          file_pattern: docs/vision/**

  # Optional: auto-build the team landing from local markdown
  generate-team-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Build team index from local people/*.md
        run: node scripts/generate-team-index.mjs
      - name: Commit team index (if changed)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(docs): rebuild team index [skip ci]"
          file_pattern: docs/team/index.md

  deploy:
    needs: [generate-cookbooks, generate-vision, generate-team-index]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Previous jobs may have committed generated docs to main.
      # Ensure we build from the latest origin/main.
      - name: Sync to latest main
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Build website
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
